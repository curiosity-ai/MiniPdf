name: Bug report
description: Report a reproducible problem with MiniPdf.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MiniPdf. Please provide enough detail for us to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: MiniPdf version
      description: Provide the NuGet package version, CLI version, commit SHA, or release tag you are using.
      placeholder: "Example: 0.1.0, v0.1.0, or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did the issue occur?
      multiple: true
      options:
        - MiniPdf library
        - MiniPdf CLI
        - MiniPdf GUI
        - MiniPdf Web demo
        - MiniPdf API
        - Other
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime or host details
      description: Include .NET SDK/runtime version, browser version, hosting platform, or container details when relevant.
      placeholder: "Example: .NET 9.0.16, ASP.NET Core on Azure App Service, Chrome 125"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      description: Provide OS name, version, and architecture.
      placeholder: "Example: Windows 11 24H2 x64, Ubuntu 24.04 x64, macOS 15 arm64"
    validations:
      required: true

  - type: textarea
    id: test-example
    attributes:
      label: Minimal test example
      description: Provide the smallest code sample, command, or steps that reproduce the issue.
      placeholder: |
        MiniPdf.ConvertToPdf("input.xlsx", "output.pdf");

        Expected:
        Actual:
    validations:
      required: true

  - type: textarea
    id: uploaded-files
    attributes:
      label: Input files
      description: Upload the source document and any generated output files needed to reproduce the issue. Drag and drop files into this field.
      placeholder: "Attach input.xlsx/input.docx and the generated PDF here."
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, logs, stack traces, or any other context that may help.
      render: text
    validations:
      required: false